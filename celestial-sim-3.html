<!DOCTYPE html>

{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.183.2/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.183.2/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Constants ──
const DEG2RAD = Math.PI / 180;
const RAD2DEG = 180 / Math.PI;
const SKY_R = 500;
const OBJ_R = 490;
let starMaxPx = 1; // max star diameter in pixels (brightest star). At 1, all stars = 1px.

// ── Observer: Evanston, IL ──
const observer = new Astronomy.Observer(41.88, -87.68, 0);

// ── State ──
let simDate = new Date();
let playing = false;
let speedMinPerSec = 60;
let lastFrameTime = 0;
let starData = null;       // full catalog (sorted by brightness)
let maxStarsVisible = 100;
let highlightPlanets = true;
let groundOpacity = 0.25; // 0 = no dimming, 1 = fully hidden below horizon
let showEcliptic = true;
let showTrails = true;
let trailHours = 24; // hours each direction (past + future)
const OBLIQUITY = 23.4393 * DEG2RAD; // ecliptic obliquity (J2000)

// ── Renderer ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, -0.001, 0.0001);

// ── Controls ──
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 0);
controls.enableZoom = false;
controls.enablePan = false;
controls.enableDamping = true;
controls.dampingFactor = 0.12;
controls.rotateSpeed = -0.5;

// ── Ground Hemisphere (lower half of sky, seen from inside) ──
const groundMat = new THREE.MeshBasicMaterial({
  color: 0x000000, side: THREE.BackSide, transparent: true, opacity: 0.25, depthTest: false
});
const ground = new THREE.Mesh(
  new THREE.SphereGeometry(OBJ_R + 3, 48, 24, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2),
  groundMat
);
ground.renderOrder = 1;
scene.add(ground);

// ── Coordinate Helpers ──
function azAltToXYZ(azDeg, altDeg, r) {
  const azRad = azDeg * DEG2RAD;
  const phi = (90 - altDeg) * DEG2RAD;
  return new THREE.Vector3(
    r * Math.sin(phi) * Math.sin(azRad),
    r * Math.cos(phi),
    -r * Math.sin(phi) * Math.cos(azRad)
  );
}

function bvToRGB(bv) {
  // Realistic naked-eye star colors: mostly white with very subtle tints
  bv = Math.max(-0.4, Math.min(2.0, bv));
  let r, g, b;
  if (bv < 0) {
    // Blue-white (O/B): faint blue tint
    r = 0.88 + bv * 0.1;
    g = 0.92 + bv * 0.05;
    b = 1.0;
  } else if (bv < 0.4) {
    // Pure white to very slightly warm (A/F)
    const t = bv / 0.4;
    r = 1.0;
    g = 1.0 - 0.03 * t;
    b = 1.0 - 0.08 * t;
  } else if (bv < 1.0) {
    // Slightly warm white (G/K) — sun-like to slightly warm
    const t = (bv - 0.4) / 0.6;
    r = 1.0;
    g = 0.97 - 0.07 * t;   // 0.97–0.90
    b = 0.92 - 0.10 * t;   // 0.92–0.82
  } else {
    // Warmest stars (late K/M) — just a hint of warmth, never orange
    const t = Math.min(1, (bv - 1.0) / 1.0);
    r = 1.0;
    g = 0.90 - 0.06 * t;   // 0.90–0.84
    b = 0.82 - 0.08 * t;   // 0.82–0.74
  }
  return [r, g, b];
}

// ── Stars ──
let starPoints, starPositions, starColors, starSizes;

const starVertShader = `
  attribute float aSize;
  attribute vec3 aColor;
  varying vec3 vColor;
  void main() {
    vColor = aColor;
    gl_PointSize = aSize;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;
const starFragShader = `
  varying vec3 vColor;
  void main() {
    float d = length(gl_PointCoord - 0.5);
    if (d > 0.45) discard;
    gl_FragColor = vec4(vColor, 1.0);
  }
`;

function initStars() {
  const n = starData.length;
  starPositions = new Float32Array(n * 3);
  starColors = new Float32Array(n * 3);
  starSizes = new Float32Array(n);

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
  geo.setAttribute('aColor', new THREE.BufferAttribute(starColors, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(starSizes, 1));

  const mat = new THREE.ShaderMaterial({
    vertexShader: starVertShader,
    fragmentShader: starFragShader,
    transparent: true,
    depthTest: false
  });

  starPoints = new THREE.Points(geo, mat);
  starPoints.renderOrder = 0;
  scene.add(starPoints);
}

function updateStars(date) {
  if (!starData) return;
  const gast = Astronomy.SiderealTime(date);
  const lstDeg = gast * 15 + observer.longitude;
  const latRad = observer.latitude * DEG2RAD;
  const sinLat = Math.sin(latRad);
  const cosLat = Math.cos(latRad);
  const dpr = window.devicePixelRatio || 1;

  for (let i = 0; i < starData.length; i++) {
    // Hide stars beyond the visibility cutoff
    if (i >= maxStarsVisible) {
      starPositions[i*3] = 0; starPositions[i*3+1] = 0; starPositions[i*3+2] = 0;
      starSizes[i] = 0;
      continue;
    }

    const raDeg = starData[i][2];
    const decDeg = starData[i][3];
    const mag = starData[i][1];
    const bv = starData[i][4];

    const haRad = (lstDeg - raDeg) * DEG2RAD;
    const decRad = decDeg * DEG2RAD;
    const sinDec = Math.sin(decRad);
    const cosDec = Math.cos(decRad);
    const cosHA = Math.cos(haRad);
    const sinHA = Math.sin(haRad);

    const sinAlt = sinDec * sinLat + cosDec * cosLat * cosHA;
    const altRad = Math.asin(sinAlt);
    const altDeg = altRad * RAD2DEG;

    const azRad = Math.atan2(-cosDec * sinHA, sinDec * cosLat - cosDec * sinLat * cosHA);

    const phi = Math.PI / 2 - altRad;
    const sinPhi = Math.sin(phi);
    const j = i * 3;
    starPositions[j]     = OBJ_R * sinPhi * Math.sin(azRad);
    starPositions[j + 1] = OBJ_R * Math.cos(phi);
    starPositions[j + 2] = -OBJ_R * sinPhi * Math.cos(azRad);

    const [cr, cg, cb] = bvToRGB(bv);
    const dim = altDeg < 0 ? (1.0 - groundOpacity) : 1.0;
    starColors[j]     = cr * dim;
    starColors[j + 1] = cg * dim;
    starColors[j + 2] = cb * dim;

    // At starMaxPx=1: all stars 1px. At higher values, brightest=starMaxPx, dimmest=1px.
    const t = 1 - (mag - (-1.5)) / 7; // 1=brightest(Sirius), 0=dimmest(mag5.5)
    starSizes[i] = (1 + Math.max(0, t) * (starMaxPx - 1)) * dpr;
  }

  starPoints.geometry.attributes.position.needsUpdate = true;
  starPoints.geometry.attributes.aColor.needsUpdate = true;
  starPoints.geometry.attributes.aSize.needsUpdate = true;
}

// ── Celestial Bodies (Sun + Planets) ──
const bodyDefs = [
  { name: 'Sun',     color: 0xffdd33, size: 14, hiSize: 140, label: '☉', textLabel: 'Sun' },
  { name: 'Moon',    color: 0xddddcc, size: 11, hiSize: 120, label: '☽', textLabel: 'Moon' },
  { name: 'Mercury', color: 0xaaaaaa, size: 5,  hiSize: 110, label: '☿', textLabel: 'Mercury' },
  { name: 'Venus',   color: 0xffffcc, size: 7,  hiSize: 120, label: '♀', textLabel: 'Venus' },
  { name: 'Mars',    color: 0xff5533, size: 6,  hiSize: 120, label: '♂', textLabel: 'Mars' },
  { name: 'Jupiter', color: 0xddcc88, size: 7,  hiSize: 120, label: '♃', textLabel: 'Jupiter' },
  { name: 'Saturn',  color: 0xccbb55, size: 6,  hiSize: 120, label: '♄', textLabel: 'Saturn' },
];

const bodySprites = [];

function makeGlowTexture(hex, symbolLabel, textLabel, highlighted) {
  const sz = highlighted ? 128 : 64;
  const c = document.createElement('canvas');
  c.width = sz; c.height = sz;
  const ctx = c.getContext('2d');
  const col = new THREE.Color(hex);
  const r = Math.floor(col.r * 255), g = Math.floor(col.g * 255), b = Math.floor(col.b * 255);
  const cx = sz / 2, cy = sz / 2;

  if (highlighted) {
    // Outer ring
    ctx.strokeStyle = `rgba(${r},${g},${b},0.6)`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, sz * 0.38, 0, Math.PI * 2);
    ctx.stroke();

    // Big glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sz * 0.42);
    grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
    grad.addColorStop(0.15, `rgba(${r},${g},${b},0.8)`);
    grad.addColorStop(0.35, `rgba(${r},${g},${b},0.25)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, sz, sz);

    // Symbol
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${sz * 0.22}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbolLabel, cx, cy);

    // Text label below
    ctx.fillStyle = `rgba(${r},${g},${b},0.9)`;
    ctx.font = `bold ${sz * 0.13}px monospace`;
    ctx.fillText(textLabel, cx, cy + sz * 0.28);
  } else {
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, sz * 0.44);
    grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
    grad.addColorStop(0.25, `rgba(${r},${g},${b},0.7)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, sz, sz);

    ctx.fillStyle = '#fff';
    ctx.font = `bold ${sz * 0.31}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(symbolLabel, cx, cy);
  }

  return new THREE.CanvasTexture(c);
}

function initBodies() {
  bodyDefs.forEach(b => {
    const tex = makeGlowTexture(b.color, b.label, b.textLabel, false);
    const hiTex = makeGlowTexture(b.color, b.label, b.textLabel, true);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(b.size, b.size, 1);
    sprite.renderOrder = 2;
    scene.add(sprite);
    bodySprites.push({ def: b, sprite, normalTex: tex, hiTex });
  });
}

function applyHighlightState() {
  bodySprites.forEach(({ def, sprite, normalTex, hiTex }) => {
    sprite.material.map = highlightPlanets ? hiTex : normalTex;
    sprite.scale.set(
      highlightPlanets ? def.hiSize : def.size,
      highlightPlanets ? def.hiSize : def.size, 1
    );
  });
}

function updateBodies(date) {
  bodySprites.forEach(({ def, sprite }) => {
    try {
      const equ = Astronomy.Equator(def.name, date, observer, true, true);
      const hor = Astronomy.Horizon(date, observer, equ.ra, equ.dec, 'normal');
      sprite.position.copy(azAltToXYZ(hor.azimuth, hor.altitude, OBJ_R));
      sprite.visible = true;
      sprite.material.opacity = hor.altitude < 0 ? (1.0 - groundOpacity) : 1.0;
    } catch (e) {
      sprite.visible = false;
    }
  });
}

// ── Cardinal Direction Labels ──
function initCardinals() {
  ['N','E','S','W'].forEach((txt, i) => {
    const c = document.createElement('canvas');
    c.width = 64; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#445566';
    ctx.font = 'bold 44px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(txt, 32, 32);

    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(18, 18, 1);
    sprite.position.copy(azAltToXYZ(i * 90, 3, OBJ_R));
    sprite.renderOrder = 3;
    scene.add(sprite);
  });
}

// ── Ecliptic / Zodiac ──
const eclipticGroup = new THREE.Group();
eclipticGroup.renderOrder = 0;
scene.add(eclipticGroup);

const ZODIAC_NAMES = ['Ari','Tau','Gem','Cnc','Leo','Vir','Lib','Sco','Sgr','Cap','Aqr','Psc'];
const ECLIPTIC_R = OBJ_R - 2; // slightly inside star sphere
const BAND_HALF = 8; // ±8° ecliptic latitude

function eclToEquatorial(lonDeg, latDeg) {
  // Ecliptic (λ, β) → Equatorial (RA hours, Dec degrees)
  const lon = lonDeg * DEG2RAD;
  const lat = latDeg * DEG2RAD;
  const sinLon = Math.sin(lon), cosLon = Math.cos(lon);
  const sinLat = Math.sin(lat), cosLat = Math.cos(lat);
  const sinE = Math.sin(OBLIQUITY), cosE = Math.cos(OBLIQUITY);

  const dec = Math.asin(sinLat * cosE + cosLat * sinE * sinLon);
  const ra = Math.atan2(sinLon * cosE - Math.tan(lat) * sinE, cosLon);
  return { raHours: ((ra * RAD2DEG / 15) + 24) % 24, decDeg: dec * RAD2DEG };
}

function eclToXYZ(lonDeg, latDeg, date) {
  const eq = eclToEquatorial(lonDeg, latDeg);
  const hor = Astronomy.Horizon(date, observer, eq.raHours, eq.decDeg, 'normal');
  return azAltToXYZ(hor.azimuth, hor.altitude, ECLIPTIC_R);
}

function buildEclipticLines(date) {
  // Clear previous
  while (eclipticGroup.children.length) eclipticGroup.remove(eclipticGroup.children[0]);

  const lineMat = new THREE.LineBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.35, depthTest: false });
  const divMat = new THREE.LineBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.25, depthTest: false });
  const STEPS = 120;

  // Upper and lower band edges
  for (const lat of [BAND_HALF, -BAND_HALF]) {
    const pts = [];
    for (let i = 0; i <= STEPS; i++) {
      pts.push(eclToXYZ(i * 360 / STEPS, lat, date));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    eclipticGroup.add(new THREE.Line(geo, lineMat));
  }

  // Center ecliptic line (very faint)
  const centerMat = new THREE.LineBasicMaterial({ color: 0x445566, transparent: true, opacity: 0.15, depthTest: false });
  const cPts = [];
  for (let i = 0; i <= STEPS; i++) {
    cPts.push(eclToXYZ(i * 360 / STEPS, 0, date));
  }
  eclipticGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(cPts), centerMat));

  // 12 zodiac boundary lines + labels
  const tickMat = new THREE.LineBasicMaterial({ color: 0x445566, transparent: true, opacity: 0.4, depthTest: false });

  for (let z = 0; z < 12; z++) {
    const lon = z * 30;
    // Long tick extending well past the band
    const p1 = eclToXYZ(lon, -(BAND_HALF + 12), date);
    const p2 = eclToXYZ(lon, BAND_HALF + 12, date);
    eclipticGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([p1, p2]), tickMat));

    // Label at midpoint of each segment
    const labelPos = eclToXYZ(lon + 15, BAND_HALF + 16, date);
    const c = document.createElement('canvas');
    c.width = 128; c.height = 64;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#667788';
    ctx.font = 'bold 40px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ZODIAC_NAMES[z], 64, 32);
    const tex = new THREE.CanvasTexture(c);
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false, opacity: 0.55 });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(28, 14, 1);
    sprite.position.copy(labelPos);
    eclipticGroup.add(sprite);
  }
}

// ── Planet Trails ──
const trailGroup = new THREE.Group();
trailGroup.renderOrder = 0;
scene.add(trailGroup);

// Planet trail colors (match body colors but dimmer)
const trailColors = {
  Sun: 0x665511, Moon: 0x555550, Mercury: 0x555555,
  Venus: 0x666650, Mars: 0x662211, Jupiter: 0x665533, Saturn: 0x555522
};

function buildTrails(date) {
  while (trailGroup.children.length) trailGroup.remove(trailGroup.children[0]);

  const steps = Math.max(20, Math.min(96, trailHours * 4)); // ~15 min intervals, cap at 96
  const msRange = trailHours * 3600000;

  bodyDefs.forEach(def => {
    const pts = [];
    for (let i = 0; i <= steps * 2; i++) {
      const t = -msRange + (i / (steps * 2)) * msRange * 2;
      const d = new Date(date.getTime() + t);
      try {
        const equ = Astronomy.Equator(def.name, d, observer, true, true);
        const hor = Astronomy.Horizon(d, observer, equ.ra, equ.dec, 'normal');
        pts.push(azAltToXYZ(hor.azimuth, hor.altitude, OBJ_R - 1));
      } catch (e) { /* skip */ }
    }
    if (pts.length > 1) {
      const geo = new THREE.BufferGeometry().setFromPoints(pts);
      const mat = new THREE.LineBasicMaterial({
        color: trailColors[def.name] || 0x444444,
        transparent: true, opacity: 0.5, depthTest: false
      });
      trailGroup.add(new THREE.Line(geo, mat));
    }
  });
}

// ── Load Star Data ──
async function loadStars() {
  const loadEl = document.getElementById('loading');
  try {
    const resp = await fetch('https://raw.githubusercontent.com/gmiller123456/hip2000/master/hipparcos_5_concise.js');
    let text = await resp.text();
    text = text.replace('hipparcos_catalog=', '').trim();
    if (text.endsWith(';')) text = text.slice(0, -1);
    text = text.replace(/,\s*]/g, ']').replace(/,\s*}/g, '}');
    starData = JSON.parse(text);
    starData = starData.filter(s => s[1] <= 5.5);
    // Sort by brightness (lowest magnitude = brightest)
    starData.sort((a, b) => a[1] - b[1]);

    // Update slider max to actual count, keep current value
    const slider = document.getElementById('star-slider');
    slider.max = starData.length;

    loadEl.style.display = 'none';
    initStars();
    updateAll();
  } catch (e) {
    loadEl.textContent = 'Error loading stars. Check connection.';
    console.error(e);
    updateBodies(simDate);
  }
}

// ── UI ──
const dateInput = document.getElementById('date-input');
const timeInput = document.getElementById('time-input');
const playBtn = document.getElementById('play-btn');
const speedSelect = document.getElementById('speed-select');
const dtDisplay = document.getElementById('datetime-display');
const highlightBtn = document.getElementById('highlight-btn');
const starSlider = document.getElementById('star-slider');
const groundSlider = document.getElementById('ground-slider');

function pad(n) { return String(n).padStart(2, '0'); }

function syncUI() {
  const d = simDate;
  // Don't overwrite inputs the user is actively editing
  if (document.activeElement !== dateInput)
    dateInput.value = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  if (document.activeElement !== timeInput)
    timeInput.value = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  dtDisplay.textContent = d.toLocaleString();
}

function readUI() {
  if (!dateInput.value || !timeInput.value) return;
  const [y, m, d] = dateInput.value.split('-').map(Number);
  const [hh, mm] = timeInput.value.split(':').map(Number);
  simDate = new Date(y, m - 1, d, hh, mm);
  updateAll();
}

document.getElementById('now-btn').addEventListener('click', () => {
  simDate = new Date(); updateAll();
});
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
});
speedSelect.addEventListener('change', () => { speedMinPerSec = +speedSelect.value; });
dateInput.addEventListener('change', readUI);
timeInput.addEventListener('change', readUI);

// Highlight toggle
highlightBtn.addEventListener('click', () => {
  highlightPlanets = !highlightPlanets;
  highlightBtn.classList.toggle('active', highlightPlanets);
  applyHighlightState();
});

// Star count slider
starSlider.addEventListener('input', () => {
  maxStarsVisible = +starSlider.value;
  document.getElementById('star-count').textContent = maxStarsVisible;
  updateStars(simDate);
});

// Star size slider (max diameter in px)
document.getElementById('size-slider').addEventListener('input', (e) => {
  starMaxPx = +e.target.value;
  document.getElementById('size-val').textContent = starMaxPx + 'px';
  updateStars(simDate);
});

// FOV slider
document.getElementById('fov-slider').addEventListener('input', (e) => {
  camera.fov = +e.target.value;
  camera.updateProjectionMatrix();
  document.getElementById('fov-val').textContent = e.target.value + '°';
});

// Ground opacity slider — controls hemisphere + star/planet dimming together
groundSlider.addEventListener('input', () => {
  const val = +groundSlider.value;
  groundOpacity = val / 100;
  groundMat.opacity = groundOpacity;
  document.getElementById('ground-val').textContent = val + '%';
  updateStars(simDate);
  updateBodies(simDate);
});

// Ecliptic toggle
document.getElementById('ecliptic-btn').addEventListener('click', () => {
  showEcliptic = !showEcliptic;
  document.getElementById('ecliptic-btn').classList.toggle('active', showEcliptic);
  eclipticGroup.visible = showEcliptic;
});

// Trails toggle
document.getElementById('trails-btn').addEventListener('click', () => {
  showTrails = !showTrails;
  document.getElementById('trails-btn').classList.toggle('active', showTrails);
  trailGroup.visible = showTrails;
});

// Trail hours slider
document.getElementById('trail-slider').addEventListener('input', (e) => {
  trailHours = +e.target.value;
  document.getElementById('trail-val').textContent = trailHours + 'h';
  if (showTrails) buildTrails(simDate);
});

// ── Update All ──
let lastEclipticUpdate = 0;
function updateAll() {
  syncUI();
  updateStars(simDate);
  updateBodies(simDate);

  // Rebuild ecliptic/trails less frequently (they're expensive)
  const now = performance.now();
  if (now - lastEclipticUpdate > 2000 || !playing) {
    if (showEcliptic) buildEclipticLines(simDate);
    if (showTrails) buildTrails(simDate);
    lastEclipticUpdate = now;
  }
}

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Animation Loop ──
function animate(t) {
  requestAnimationFrame(animate);

  if (playing && lastFrameTime > 0) {
    const dt = (t - lastFrameTime) / 1000;
    simDate = new Date(simDate.getTime() + dt * speedMinPerSec * 60000);
    updateAll();
  }
  lastFrameTime = t;

  controls.update();
  renderer.render(scene, camera);
}

// ── Init ──
initBodies();
applyHighlightState();
initCardinals();
buildEclipticLines(simDate);
buildTrails(simDate);
syncUI();
loadStars();
animate(0);
</script>
</body>
</html>
